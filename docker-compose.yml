version: "3.9"

services:

  postgres:

    image: postgres

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: password

      POSTGRES_DB: ciphervault

    ports:

      - "5432:5432"

  backend:

    build: ./backend

    ports:

      - "5000:5000"

    depends_on:

      - postgres

  frontend:

    build: ./frontend

    ports:

      - "5173:5173"
